body:
  text: 加子午丑即橢圜差角何也今以丑午徑線依𧰼限與子午斜交成子丑午句股形以句子午自乘為子午室虛正方以弦自乘丑午與子已等為子已危辰正方二方相減餘午已危辰虛室曲尺形與股子丑自乘之子丑奎壁積數等子丑奎與室危虛辰等子壁奎與午已室危等算差角之法以底危昴胃乘高半徑即其高亦即外垂線折半即得底乘高為己婁危胃方形折半為己危午昴長方形視已午危室止少一室昴危凡正方形分為三己婁一婁畢二畢子三作子胃與畢危兩斜線則畢危子胃斜方與己危畢等亦與子胃辰等畢危子胃為正方中三分之一己婁危胃亦正方中三分之一今子胃危為畢危子胃之半知即
  hash: sha256:86b5c44f89cbbb6b6bbb9a618245e9aa3a76245371263031e779f828dc775206
