body:
  text: 丑寅兩半徑線會於斗成寅斗丑三角形即成丑斗辰橢圜三角形午辰適滿𧰼限寅斗平行丑斗會之丑斗辰與子午辰積同以斗午女補子丑女雖微有差大略相等凡寅斗之平行丑斗之交會皆自此生也箕辰過𧰼限則子箕辰較丑斗辰小一斗牛箕箕辰不滿𧰼限則子箕辰較丑斗辰大一子丑牛故求得丑斗辰積必加子牛丑積乃合子箕辰積子牛丑與斗牛箕其積與差角同故與差角為加減也
  hash: sha256:b91868379361a6f4b3b0e116317a4e56c290ee87b97ac936427ccd3e71d9f2df
