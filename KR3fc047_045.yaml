  text: 地心丑去最卑近去最高遠子在最高與地心丑之閒最卑後子在丑前則丑斗辰緼於子斗辰之內故小於子斗辰最高後丑在子前則丑斗辰周於子斗辰之外故大於子斗辰有橢圜之靣積可以求地心之角度是謂以積求角有丑斗辰橢圜一度靣積求丑角度酉戌以丑辰小徑自乘為丑隨姤辰小方又以中率徑丑酉即子庚自乘為丑酉渙遁大方以小方比丑斗辰以大方比丑戌
