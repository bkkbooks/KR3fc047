body:
  text: 有子角度辰房求丑斗作寅斗平行線寅角即子角有寅角有寅丑兩心差數用正弧三角法求得丑節中垂線亦求得寅未弧於是於二千萬中減寅節餘節斗丑斗為股弦和以丑節為句用句與股弦和求弦法即求得丑斗角在地心則垂於內丑角酉戌角在心差則垂於外子角辰房內垂之角例以平行外垂之角通以對角立卯辰直線以二線平行交之寅角必等於子角立卯辰直線以一線交之丑對角必等於丑角外垂以加內垂以減加於二千萬如豐丑減於二千萬如節丑
