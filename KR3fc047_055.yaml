body:
  text: 有子角角辰求丑角酉戌先用大小徑比例自角得房辰小徑一率大徑二率小切三率大切四率以角辰知小切以大切知房辰然後用房辰爲寅角度卽爲設角用內垂綫求得斗角以斗角與寅角相加得丑外角卽地心丑角酉戌葢酉夬與辰升應酉戌與辰斗應丑斗辰較子心辰在限內少一差角在限外多一差角丑升斗爲差角卽丑戌酉較子心辰在限內少一差角在限外多一差角也丑夬戌爲差角在限內必加一差角而丑斗辰乃同於子心辰在限外必減一差角而丑斗辰乃同於子心辰詳見子心丑牛及斗心艮亦乃爲角辰度所求之也角酉戌也必先求辰房爲寅角者俟得酉夬後始求夬戌則必有丑升弧有丑斗弧更有丑升斗之斗角或升角乃可用弧三角法求得夬戌以加酉夬爲酉戌今丑升弧可求餘不可得不如先得辰房之爲便也先得辰房則已於子心辰增損一差角而所求得之丑斗辰不必復事增損其丑升辰之靣積卽朱經增損之丑斗辰旣豫爲增損則以原爲丑斗辰者改斗爲升以與之别以角求積加減辨於高卑借積求積加減判以𧰼限葢兩綫相遇綫之後者包於外兩綫相交綫之長者處其贏前後之位以高卑而互易短長之度以𧰼限而遞更
