body:
  text: 長於子午短長相覆故其積與橢圜之積等以兩要線憑橢弧而施之同其底則兩要之度較異而和同以寅丑為底寅午丑午為兩要成三角形若移寅午為寅壬寅癸寅已移丑午為丑壬丑癸丑己則成寅壬丑寅癸丑寅已丑三三角形既同此寅丑底同此辰午卯橢圜弧則分兩要雖有較丑壬必短於寅壬丑癸必短於寅癸丑已必短於寅已合兩要而和之此短則彼長絶長補短其為二千萬之數同也半徑之率一千萬兩半徑故二千萬自平圜心截平圜以為度其正弦之端交於平圜必不交於橢圜若正弦交於橢圜則必不交於平圜又自平圜心作線與正弦交於橢圜其形必有差若自平圜心作線與正絃交於平圜其形亦必有差是差也謂之橢圜差角在平圜為正弦在橢圜為矢今槩稱正弦以便於覽
