body:
  text: 酉小方一率大方二率丑辰斗三率丑戌酉四率得數以一度定積求之一度定積即中率靣積所分者詳見前得酉戌為丑角若由一度更求二度則先求丑斗線地心角用外垂法以丑斗自乘與中率自乘為比例蓋每度之線有長短之不一則所比例之積有多寡之不一也丑斗異於丑辰則丑斗巽震亦異於丑辰隨姤而所求得之丑角酉戌自異於丑辰之所求矣有心差之角度可以得橢圜之靣積是謂借積求積有子角角辰度求丑斗辰靣積先以角辰度為寅角
