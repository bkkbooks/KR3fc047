body:
  text: 十月初九日李鋭啓比來連接手書共三通并大作釋橢一本悉民展讀見所述圖説俱極簡當明白真不朽之盛業也偶有一二獻疑處已别簽出今一并奉上即希照入其簽語有未當還望教正過吳時務示一音阮閣學命校測員海鏡大約正月間可校畢得讀祕書惠由足下感謝感謝王引之頓首去歲奉書一函託鄭星兄轉致想已入覽兹從沈四丈處得見大著釋橢及所和詩釋橢為沈丈鈔録未畢尚未攜歸細讀生平不喜略觀大槩於足下所作尤不敢草草讀之恐不能𧗁沈欎之思淡雅之才也正月二十日引之頓首去冬除月二十六日接讀手翰兼賜瑤章及大著釋橢一書鈁再三伏讀覺視勿𤲅先生書尤朗若列睂但鈁明圖説之理用法尚祈提命耳沈鈁頓首山莊别後即渡江由吳至越留西湖上與錢塘諸詩人遊詠數日鬯甚抵東山一路俱無恙晤金輔之殿撰以尊作釋橢釋弧與參之程易田先生尚未晤也楊大壯頓首
