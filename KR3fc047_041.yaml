body:
  text: 句通於餘弦股通於正弦弦通於半徑以寅丑半徑為弦則丑節正弦為句寅節餘弦為股以寅咸半徑為弦則益咸正弦為句寅節餘弦為股句股與八線本相比例詳見釋弧而互相為用尤見精巧至橢圜子辰半徑此寅丑得為半徑者半徑長短視乎圜而率為一千萬則不易也中半徑因大徑小徑而成且用實率故不依一千萬之數有垂線以得句股有句股和以得兩要有兩要以得弦矢有寅角則以寅斗為半徑求得斗鼎句有丑角則以
