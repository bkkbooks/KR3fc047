body:
  text: 線遇之亦自然之勢也自弦言之子角尾為子尾亢差角子房心為子心氐差角自弧言之子心箕為子心辰差角子房角為子角辰差角自倍差點設徑線即半徑所移線與平圜度線平行有角度即有此線謂之設角寅為倍差點丑為地心寅斗線與子房線平行其角度皆等故有子角即有寅角也自地心設線與倍差心線之端遇於橢圜在象限無差角之較內於限則大一差角外於限則小一差角大則加之小則減之
  hash: sha256:a8d50b3b16abd82623ab80a2cad0c9e748cc6fb3cc3ac5b48330fa79e776e3d8
