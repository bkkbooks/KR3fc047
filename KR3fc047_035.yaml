body:
  text: 寅斗丑斗合二千萬分之不知其數乃以寅斗與丑斗聯為一線作丑斗泰長線斗泰即寅斗為之底以寅丑兩心差為小要成寅丑泰三角形此形有丑泰弧有寅丑弧有丑外角必先知丑角酉戌求得泰角又求得寅泰弧中寅泰而半之成觀泰斗句股形此形有泰角有觀泰弧用正弧三角法求得泰斗即得寅斗也求法詳見釋弧若以丑斗連於寅斗前圖以寅斗連丑斗作寅復丑三角形此形有寅角與角度線平行有寅丑弧有寅復弧可求復角及復丑弧有復丑弧有復角可得復斗弧矣復斗即丑斗若以復角
