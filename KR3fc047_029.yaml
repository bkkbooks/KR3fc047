  text: 子巽屯倍差角巽屯底與箕斗弧交於兌則兌斗巽與兌屯箕等故巽子屯與子斗箕等自斗作斗艮線則斗艮箕與子丑牛等大徑小徑者比例之根也子已為大徑子午為小徑子已與子午如房氐與心氐亦如豫辰與謙辰又如子房辰與子心辰求角度必比例得正弦若自辰角求辰房必以大小徑比例正切而得之
