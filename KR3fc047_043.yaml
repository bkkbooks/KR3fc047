body:
  text: 丑斗爲半徑求得斗鼎句有斗鼎句卽橢圜辰斗之矢用大小徑求得鼎恒卽大圜辰恒弧度之正弦故由寅角丑角求恒辰弧度由恒辰弧度求寅角丑角俱以斗鼎爲之樞紐也於是有地心之角度可以求橢圜之靣積是謂以角求積有丑角酉戌求丑斗辰靣積先檢表卽八綫表余載於釋弧後得正弦頥戌以半徑與頥戌例丑斗與斗鼎而得斗鼎又用大小徑比例得恒鼎爲辰恒正弦以頥戌與酉戌例恒鼎與辰恒而得辰恒弧綫卽用乘半徑折半得子恒辰靣積又用大小徑比例求得子斗辰較丑斗辰多一子丑斗乃子丑有數卽心差丑斗弧有數用外垂綫求得丑外角有數子斗丑之丑角爲丑角酉戌之外角求得積與子斗辰相減卽丑斗辰橢圜靣積此丑斗綫在最卑後若在最高後則子斗辰較丑斗辰少一子丑斗亦用弧三角法求得積與子斗辰相加卽丑斗辰橢圜靣積
