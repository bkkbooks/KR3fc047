body:
  text: 丑斗為半徑求得斗鼎句有斗鼎句即橢圜辰斗之矢用大小徑求得鼎恆即大圜辰恆弧度之正弦故由寅角丑角求恆辰弧度由恆辰弧度求寅角丑角俱以斗鼎為之樞紐也於是有地心之角度可以求橢圜之靣積是謂以角求積有丑角酉戌求丑斗辰靣積先檢表即八線表余載於釋弧後得正弦頥戌以半徑與頥戌例丑斗與斗鼎而得斗鼎又用大小徑比例得恆鼎為辰恆正弦以頥戌與酉戌例恆鼎與辰恆而得辰恆弧線即用乘半徑折半得子恆辰靣積又用大小徑比例求得子斗辰較丑斗辰多一子丑斗乃子丑有數即心差丑斗弧有數用外垂線求得丑外角有數子斗丑之丑角為丑角酉戌之外角求得積與子斗辰相減即丑斗辰橢圜靣積此丑斗線在最卑後若在最高後則子斗辰較丑斗辰少一子丑斗亦用弧三角法求得積與子斗辰相加即丑斗辰橢圜靣積
  hash: sha256:cf7b12232cdbe21f3716bf10cb223a43c5b7d7080e91c098005e58a6b8e33704
