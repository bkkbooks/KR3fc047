body:
  text: 橢圜以積數爲角度求得積數以一度之積除之卽爲橢圜之弧度若以角言之子心不以亥辰爲角仍以大圜甲辰爲角地心丑不以辰乙爲角必以酉戌爲角凡言平圜心角皆甲辰如後房辰角辰凡言地心角皆酉戌橢圜可以弧言不可以角言故求得丑辰乙後作丑辰斗靣積卽得辰乙弧度更求酉戌乃丑角也平圜之度其弧皆等切其弧之度爲平行詳見釋弧釋輪以大半徑卽半徑小半徑乘而開方之爲中半徑謂之中率以中率規而圜之爲平圜其度與橢圜等得其靣積以三百六十分之得橢圜一度之積是爲實行子已爲大半徑子午爲小半徑午已爲兩徑之較自午已折而爲戊午合小徑爲戊子成中半徑以中半徑規而圜之成戊庚丁辛平圜子辛短於子辰子戊
  hash: sha256:0df7d712bcf37555d02958cb2fb3b104d0be7c0c06809f632a3cd409aed0f706
