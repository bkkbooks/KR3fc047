body:
  text: 橢圜以積數為角度求得積數以一度之積除之即為橢圜之弧度若以角言之子心不以亥辰為角仍以大圜甲辰為角地心丑不以辰乙為角必以酉戌為角凡言平圜心角皆甲辰如後房辰角辰凡言地心角皆酉戌橢圜可以弧言不可以角言故求得丑辰乙後作丑辰斗靣積即得辰乙弧度更求酉戌乃丑角也平圜之度其弧皆等切其弧之度為平行詳見釋弧釋輪以大半徑即半徑小半徑乘而開方之為中半徑謂之中率以中率規而圜之為平圜其度與橢圜等得其靣積以三百六十分之得橢圜一度之積是為實行子已為大半徑子午為小半徑午已為兩徑之較自午已折而為戊午合小徑為戊子成中半徑以中半徑規而圜之成戊庚丁辛平圜子辛短於子辰子戊
  hash: sha256:aebd1ad7472791875fbbe9bd22f0d8a4f61ec635674375ce2fc80d4cb03d9898
