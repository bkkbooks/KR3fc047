body:
  text: 自子作線截平圜於角則角辰為子角弧度角亢為正弦與子角線遇於平圜交橢弧處則為亢尾與角不相遇矣若别作氐心正弦遇於心則氐房與子角亦不相遇此自然之勢也若以角亢正弦自橢弧截為亢尾則自子作子尾線遇之若氐心正弦伸至平圜為氐房則自子作子房
