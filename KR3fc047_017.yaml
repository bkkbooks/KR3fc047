body:
  text: 自子作綫截平圜於角則角辰爲子角弧度角亢爲正弦與子角綫遇於平圜交橢弧處則爲亢尾與角不相遇矣若别作氐心正弦遇於心則氐房與子角亦不相遇此自然之勢也若以角亢正弦自橢弧截爲亢尾則自子作子尾綫遇之若氐心正弦伸至平圜爲氐房則自子作子房
