body:
  text: 以此就彼則加減在此以彼就此則加減在彼加猶減也減猶加也最卑後丑斗在子斗之後必至最高後丑斗乃移在子斗之前蓋子丑相遇於斗過象限而長短雖移前後不移也子心與丑斗交於女在限內子心線長則子丑女多一子丑牛在限外丑斗線長則斗心女多一斗心艮然最高後一象限雖多在斗心艮其用加實同於最卑後一象限最卑前一象限雖多在子丑牛其用減實同於最高前一象限亦以前後分內外也以角求積是化子斗辰以就丑斗辰以積求積是化丑斗辰以就子斗辰故在彼為減則此加在此為減則彼加也借角求角之用加減同於借積求積但不加減於求得之後而加減於未得之先無加減之迹實收加減之用其理不殊法為尤妙明乎此者日月之行坐而致矣四法中莫捷於借角求角故日𨇠求均數用此法門人汪昌序校字男廷琥
