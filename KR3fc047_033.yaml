body:
  text: 以三百六十除之每度靣積八七二五三九九九五二二九卽爲一度之積數橢圜積數必自大圜積數以相比例求大圜積數先以角度化爲率數以一百八十度化爲六十四萬八千秒爲一率半周率數爲二率見在角度化秒爲三率乘半徑折半卽得角度乘半徑折半得積數亦試以方形明之辰房己猶之辰危己以己危乘子辰得子已危辰正方積猶以已房乘子辰得子己房辰一限積也若以已辰乘子辰則不異已危辰乘子辰故必折半乃得也求子辰危句股積以辰危乘子辰必折半而得求子辰房弧三角積以辰房乘子辰亦必折半可知矣推之子胃辰之與子角辰子履辰之與子比辰無不皆然葢胃辰乘子辰爲子婁胃辰縱方履辰乘子辰爲子畢履辰縱方皆必折半乃句股積也兩要之和求角之要也
