body:
  text: 二綫平行詳見前用內垂綫求得丑斗以丑斗爲半徑求得斗鼎用大小徑比例求得鼎恒以爲正弦檢表得恒辰弧度得恒辰弧度用率數乘子辰半徑折半得子恒辰靣積又用大小徑比例得子斗辰靣積大徑一率小徑二率子恆辰三率子斗辰四率存之用大小徑比例切綫得辰房辰謙一率辰角二率辰豫三率辰房四率用率數乘子辰半徑折半得子房辰靣積用大小徑比例求得子心辰辰豫一率辰房子二率辰謙三率子心辰四率乃以子心辰減所存之子斗辰餘子斗心積數存之用心差子丑乘斗鼎折半得子斗艮本以斗艮乘斗鼎斗艮無數以其數與子丑等故用子丑減子斗心所以必先求子斗心靣積餘斗心艮一鈍二銳形此形與子丑牛同知此卽知子丑牛靣積矣
