body:
  text: 釋橢序江都焦君里堂厲節讀書綜經研傳鈎深致遠復精推步稽古法之九章考西術之八線窮弧矢之微𧗊方圓之𠮓與凌君仲子李君尚之齊名嘉慶三年秋里堂出所製釋橢一篇示子考西法自多祿畝以至苐谷皆以日月五星之本天為平圓其後西人有刻白爾噶西尼等以為橢圓兩端徑長兩要徑短雍正八年六月朔日食舊法推得九分二十二秒今法推得八分十秒驗諸實測今法為合於是詔用今法橢圓起於不同心天之兩心差引而倍之為倍心差用靣積求平行實行之差於是有大小徑中率與平圓之比例及差角之加減與舊法不同矣其法以靣積之度與角度相較亦可得平行實行之差然平行靣積也實行角度也以積求角難以角求積易故先設以角求積次設以積求角次設借積求積次設借角求角四法最為𥳑捷與舊法逈殊其言日𨇠之理亦即盈縮高卑之說也如橢圜以地心為心規橢圜之形中畫為午從地心作線分為三百六十度每分之積皆為一度每一分積為六十分太陽每日右旋當每一度積之五十九分有奇所謂平行也則太陽在午線之下是為
  hash: sha256:f07564db758de39b6a91d0ea8385c2aaa3c4ac5207ac6a824db53e476acfb1be
