body:
  text: 長於子午短長相覆故其積與橢圜之積等以兩要綫憑橢弧而施之同其底則兩要之度較異而和同以寅丑爲底寅午丑午爲兩要成三角形若移寅午爲寅壬寅癸寅已移丑午爲丑壬丑癸丑己則成寅壬丑寅癸丑寅已丑三三角形旣同此寅丑底同此辰午卯橢圜弧則分兩要雖有較丑壬必短於寅壬丑癸必短於寅癸丑已必短於寅已合兩要而和之此短則彼長絕長補短其爲二千萬之數同也半徑之率一千萬兩半徑故二千萬自平圜心截平圜以爲度其正弦之端交於平圜必不交於橢圜若正弦交於橢圜則必不交於平圜又自平圜心作綫與正弦交於橢圜其形必有差若自平圜心作綫與正絃交於平圜其形亦必有差是差也謂之橢圜差角在平圜爲正弦在橢圜爲矢今槩稱正弦以便於覽
