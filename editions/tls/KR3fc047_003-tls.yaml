body:
  text: 釋橢序江都焦君里堂厲節讀書綜經研傳鈎深致遠復精推步稽古法之九章考西術之八綫窮弧矢之㣲𧗊方圓之𠮓與凌君仲子李君尙之齊名嘉慶三年秋里堂出所製釋橢一篇示子考西法自多祿畝以至苐谷皆以日月五星之本天爲平圓其後西人有刻白爾噶西尼等以爲橢圓兩端徑長兩要徑短雍正八年六月朔日食舊法推得九分二十二秒今法推得八分十秒驗諸實測今法爲合於是詔用今法橢圓起於不同心天之兩心差引而倍之爲倍心差用靣積求平行實行之差於是有大小徑中率與平圓之比例及差角之加減與舊法不同矣其法以靣積之度與角度相較亦可得平行實行之差然平行靣積也實行角度也以積求角難以角求積易故先設以角求積次設以積求角次設借積求積次設借角求角四法最爲𥳑㨗與舊法逈殊其言日𨇠之理亦卽盈縮高卑之説也如橢圜以地心爲心規橢圜之形中畫爲午從地心作綫分爲三百六十度每分之積皆爲一度每一分積爲六十分太陽每日右旋當每一度積之五十九分有奇所謂平行也則太陽在午綫之下是爲
