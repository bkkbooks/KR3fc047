body:
  text: 最卑而地心至橢圜界之綫短角度必寛是爲行盈太陽在午綫之上是爲最高而地心至橢圜界之綫長角度必狹是爲行縮盈縮高卑之理雖與地谷同而橢圜之法則密於苐谷諸輪之法若以諸輪法測今日日月五星之天有不謬以千里者哉昔秦大司宼蕙田輯五禮通考觀𧰼授時一門戴編修震分纂詳述諸輪之法而不及大陽地半徑差淸𫎇氣差橢圜之説不亦傎乎是篇仿線淵觀𧰼賦之例自爲圖註反復參稽抉藴闡奧爲實測推步之學者所不可無之書也學者從事於斯以求日𨇠月離交食諸輪無晦不明無隱不顯矣里堂不以藩爲謭劣屬序是篇乃書橢圜緣起爲讀是篇者之先導云嘉慶三年季冬月友人甘泉江藩作
