body:
  text: 江都焦循述康熙甲子律書用諸輪法雍正癸卯律書用橢圜法葢實測隨時而差則立法亦隨時而改循學習此術以義藴深密未易尋究謹擇其精要析而明之庶幾便於初學云爾嘉慶元年九月朔錄於吳興舟次橢圜之法起於兩心差引兩心差而倍之謂之倍心差以倍心差爲底以兩半徑爲要得中垂綫爲小半徑亦曰小徑或以兩心差爲句半徑爲弦求得股亦小徑倍小徑與全徑交規而圜之是爲橢圜卯未辰已平圜也子丑爲兩心差寅子丑爲倍心差自子至己至未至卯至辰皆半徑以寅丑爲底以兩半徑爲兩要成寅午丑三角形午之所當爲子子午
