body:
  text: 綫遇之亦自然之勢也自弦言之子角尾爲子尾亢差角子房心爲子心氐差角自弧言之子心箕爲子心辰差角子房角爲子角辰差角自倍差㸃設徑綫卽半徑所移綫與平圜度綫平行有角度卽有此綫謂之設角寅爲倍差㸃丑爲地心寅斗綫與子房綫平行其角度皆等故有子角卽有寅角也自地心設綫與倍差心綫之端遇於橢圜在𧰼限無差角之較內於限則大一差角外於限則小一差角大則加之小則減之
