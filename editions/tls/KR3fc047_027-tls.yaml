body:
  text: 長於房軫而軫翼廣於柳氐多少相覆其數亦等故子乾坎三角形與軫房張翼等子坤坎三角形與張房柳氐等房震爲倍差底與子氐相乘成離震軫房形折半爲軫房翼心是子房震倍差角子心亢爲差角半於子房震卽軫房翼心縱方形也猶子胃危與已婁胃危縱方軫房翼張與子坤坎等子坤坎同子坎乾則子房震倍差角形卽子坤坎句股形也子心房爲子房震之半子丑牛亦子坤坎之半故子丑牛之積與差角同也惟差角與軫房翼心等股自乘與軫房翼張等較之差一張心房三角形而子丑牛視子坤坎之半微大兩相消息以意會之可爲比例也
