body:
  text: 十月初九日李銳啟比來連接手書𠔏三通并大作釋橢一本悉民展讀見所述圖説俱極簡當明白眞不朽之盛業也偶有一二獻疑處已别簽出今一并奉上卽希照入其簽語有未當還望教正過吳時務示一音阮閣學命校測員海鏡大約正月閒可校畢得讀秘書惠由足下感謝感謝王引之頓首去歲奉書一函託鄭星兄轉致想已入覽兹從沈四丈處得見大著釋橢及所和詩釋橢爲沈丈鈔錄未畢尙未攜歸細讀生平不喜略觀大槩於足下所作尤不敢草草讀之恐不能𧗊沈欎之思澹雅之才也正月二十日引之頓首去冬除月二十六日接讀手翰兼賜瑤章及大著釋橢一書鈁再三伏讀覺視勿𤲅先生書尤朗若列睂但鈁明圖説之理用法尙祈提命耳沈鈁頓首山莊别後卽渡江由吳至越畱西湖上與錢塘諸詩人游詠數日鬯甚抵東山一路俱無恙晤金輔之殿𢰅以尊作釋橢釋弧與參之程易田先生尙未晤也楊大壯頓首
  hash: sha256:2669904df04b2152f6df420391c059f137d26ff2bcdc9e7e6f506e1910257f15
