body:
  text: 已婁危胃之半己危午昴也子丑奎壁旣與午已危辰虛室曲尺形等若規小徑子午作平圜與大圜爲距等改切綫爲弦綫已危辰大圜之切綫午室虛小徑平圜之切綫婁角亢大圜之弦綫觜心氐小徑平圜之切綫亦以股自乘之方爲切壁奎丑而規其內爲圜壁參鬼復於其內作弦綫井參鬼則井參子鬼亦與觜婁角亢氐心曲尺形等差角之綫子房以此分界則圜內弦綫爲軫房氐柳張翼曲尺形亦與圜內子坤乾坎縱方形積等氐房
