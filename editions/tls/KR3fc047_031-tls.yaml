body:
  text: 大小徑比例之法至精至妙試化圜爲方以顯其藴大徑八小徑六大弦四房氐小弦三心氐以四乘六得二十四以八除之得三大徑一率小徑二率大弦三率小弦四率以八乘三得二十四以三除之得四小徑一率大徑二率小弦三率大弦四率大積子房辰十一以氐房乘子辰折半小積子心辰九以氐心乘子辰折半或以心氐乘子氐得九以房氐乘子氐得十二以十二乘六得七十二以八除之得九大徑一率小徑二率大積三率小積四率以八乘九得七十二以六除之得十二小徑一率大徑二率小積三率大積四率互相比例無不皆合推此而子豫辰與子謙辰積數子房氐與子心氐積數皆可例之其子房辰不可與子角辰例子箕辰不可與子房辰例均於是了然矣率數者角度之凖也圜周求徑之法每三一四一五九二得全徑一今全徑二故三一四一五九二爲半周也以此比例得中率平圜靣積三一四一一四三九八二八二三三七
